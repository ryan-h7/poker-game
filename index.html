<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texas Hold'em Poker</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header>
      <h1>Texas Hold'em</h1>
      <span id="phase" class="phase-badge">Ready</span>
      <div id="display-mode" class="display-mode hidden" role="group" aria-label="Amount display">
        <button type="button" id="display-dollars" class="display-mode-btn active">$</button>
        <button type="button" id="display-bb" class="display-mode-btn">BB</button>
      </div>
      <button id="btn-stop-replay" class="btn btn-stop-replay hidden" type="button">Stop Replay</button>
    </header>

    <div class="table-area">
      <div class="table">
        <div class="table-felt">
          <div id="pot" class="pot"></div>
          <div id="community" class="community"></div>
        </div>
        <div id="seats" class="seats"></div>
      </div>
    </div>

    <div id="message" class="message-bar"></div>

    <div id="online-toolbar" class="online-toolbar hidden">
      <button id="btn-rebuy" class="btn btn-rebuy hidden" type="button">Rebuy</button>
      <button id="btn-table-details" class="btn btn-table-details" type="button" aria-expanded="false">Table details</button>
      <button id="btn-leave-session" class="btn btn-leave" type="button">Leave table</button>
    </div>

    <div id="table-details-panel" class="table-details-panel hidden">
      <div class="table-details-header">
        <h2>Table details</h2>
        <button id="btn-close-table-details" class="btn-close-details" type="button" aria-label="Close table details">×</button>
      </div>
      <p class="lobby-hint" id="lobby-hint">Share the link with friends.</p>
      <p id="lobby-table-settings" class="lobby-table-settings"></p>
      <div class="lobby-code">Room: <strong id="lobby-room-code">—</strong></div>
      <div class="invite-row">
        <input type="text" id="invite-link" class="invite-link" readonly inputmode="url" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button id="btn-copy-link" class="btn btn-copy" type="button">Copy Link</button>
        <button id="btn-share-link" class="btn btn-share hidden" type="button">Share</button>
      </div>
      <ul id="lobby-players" class="lobby-players"></ul>
    </div>

    <div id="skip-bar" class="skip-bar hidden">
      <button id="btn-skip" class="btn btn-skip" type="button">Skip to end</button>
      <label class="skip-auto">
        <input type="checkbox" id="auto-skip">
        Auto-skip when folded pre-flop
      </label>
    </div>

    <div id="controls" class="controls hidden">
      <div class="action-row">
        <button id="btn-fold" class="btn btn-fold">Fold</button>
        <button id="btn-check" class="btn btn-check">Check</button>
        <button id="btn-call" class="btn btn-call">Call</button>
      </div>
      <div class="raise-panel">
        <div class="pot-presets" id="pot-presets">
          <button type="button" class="btn-preset" data-pct="0.25">25%</button>
          <button type="button" class="btn-preset" data-pct="0.33">33%</button>
          <button type="button" class="btn-preset" data-pct="0.5">50%</button>
          <button type="button" class="btn-preset" data-pct="0.66">66%</button>
          <button type="button" class="btn-preset" data-pct="0.75">75%</button>
          <button type="button" class="btn-preset" data-pct="1">100%</button>
          <button type="button" class="btn-preset" data-pct="1.25">125%</button>
        </div>
        <div class="raise-adjust">
          <label class="raise-input-label" for="raise-input" id="raise-input-label">Raise to $</label>
          <input type="number" id="raise-input" class="raise-input" min="0" step="1" inputmode="numeric">
          <input type="range" id="raise-slider" min="0" max="1000" value="40" aria-label="Raise amount slider">
          <button id="btn-raise" class="btn btn-raise">Raise</button>
          <button id="btn-allin" class="btn btn-allin" type="button">All-In</button>
        </div>
        <span id="raise-hint" class="raise-hint"></span>
      </div>
    </div>

    <div id="setup-bar" class="setup-bar">
      <div class="bot-stepper" aria-label="Bot count">
        <span class="setup-label">Bots</span>
        <button id="btn-remove-bot" class="btn-stepper" type="button" aria-label="Remove bot">−</button>
        <span id="bot-count" class="bot-count">3</span>
        <button id="btn-add-bot" class="btn-stepper" type="button" aria-label="Add bot">+</button>
      </div>
      <span id="table-size-hint" class="setup-hint">4 players</span>
      <label class="setup-label" for="starting-stack">Stack</label>
      <select id="starting-stack" class="setup-select">
        <option value="500">$500</option>
        <option value="1000" selected>$1,000</option>
        <option value="2000">$2,000</option>
        <option value="5000">$5,000</option>
        <option value="10000">$10,000</option>
      </select>
      <label class="setup-label" for="big-blind">Big Blind</label>
      <select id="big-blind" class="setup-select">
        <option value="5">$5</option>
        <option value="10">$10</option>
        <option value="20" selected>$20</option>
        <option value="25">$25</option>
        <option value="50">$50</option>
        <option value="100">$100</option>
      </select>
      <span id="max-rebuys-wrap" class="max-rebuys-wrap hidden">
        <label class="setup-label" for="max-rebuys">Rebuys</label>
        <select id="max-rebuys" class="setup-select">
          <option value="0">None</option>
          <option value="1">1 per player</option>
          <option value="2">2 per player</option>
          <option value="3" selected>3 per player</option>
          <option value="5">5 per player</option>
          <option value="-1">Unlimited</option>
        </select>
      </span>
      <button id="btn-new-hand" class="btn btn-deal">Deal Hand</button>
      <button id="btn-reset-solo" class="btn btn-reset-solo hidden" type="button">Reset Game</button>
      <button id="btn-play-friends" class="btn btn-friends" type="button">Play with Friends</button>
      <button id="btn-replay-hand" class="btn btn-replay" type="button" disabled>Replay Hand</button>
      <label class="setup-option">
        <input type="checkbox" id="show-bot-hands">
        Show bot hands after each hand
      </label>
    </div>

    <div id="multiplayer-panel" class="multiplayer-panel hidden">
      <h2 class="multiplayer-title">Play with Friends</h2>
      <div id="lobby-entry" class="lobby-entry">
        <input type="text" id="player-name" class="lobby-input" placeholder="Your name" maxlength="16">
        <input type="text" id="join-room-code" class="lobby-input lobby-code-input" placeholder="Room code" maxlength="6" autocapitalize="characters" spellcheck="false">
        <button id="btn-create-room" class="btn btn-multiplayer" type="button">Create Room</button>
        <button id="btn-join-room" class="btn btn-multiplayer-outline" type="button">Join Room</button>
      </div>
    </div>

    <aside class="sidebar">
      <h2>Action Log</h2>
      <div id="log" class="log"></div>
    </aside>
  </div>

  <div id="join-modal" class="join-modal hidden" role="dialog" aria-modal="true" aria-labelledby="join-modal-title">
    <div class="join-modal-card">
      <h2 id="join-modal-title">Join a game</h2>
      <p id="join-modal-sub" class="join-modal-sub">Enter the room code from your friend.</p>
      <label class="join-modal-label" for="join-modal-room">Room code</label>
      <input type="text" id="join-modal-room" class="join-modal-input join-modal-code" placeholder="e.g. ABC123" maxlength="6" autocapitalize="characters" spellcheck="false">
      <label class="join-modal-label" for="join-modal-name">Your name</label>
      <input type="text" id="join-modal-name" class="join-modal-input" placeholder="Enter your name" maxlength="16" autocomplete="nickname">
      <p id="join-modal-error" class="join-modal-error hidden"></p>
      <div class="join-modal-actions">
        <button id="btn-join-modal-submit" class="btn btn-join-modal" type="button">Join Game</button>
        <button id="btn-join-modal-cancel" class="btn btn-join-modal-cancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
