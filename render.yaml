databases:
  - name: poker-game-db
    plan: free
    databaseName: poker_game
    user: poker_game

services:
  - type: web
    name: poker-game
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: poker-game-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
